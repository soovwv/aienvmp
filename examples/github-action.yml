name: Environment Map

on:
  pull_request:
  workflow_dispatch:

jobs:
  aienvmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: soovwv/aienvmp@main
        with:
          directory: "."
          write-plan: "true"
          write-schema: "true"
          write-doctor-json: "true"
          write-sbom: "true"
          write-summary: "true" # appends summary, strict plan, follow-up plan, and AI loop to GitHub Step Summary
          strict: "off" # security, policy, coordination, all, or off

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aienvmp
          path: |
            AIENV.md
            .aienvmp/manifest.json
            .aienvmp/status.json
            .aienvmp/summary.md
            .aienvmp/sbom.json
            .aienvmp/sbom.cdx.json
            .aienvmp/schema.json
            .aienvmp/doctor.json
            .aienvmp/plan.json
            .aienvmp/plan.md
            .aienvmp/dashboard.html
          if-no-files-found: ignore
