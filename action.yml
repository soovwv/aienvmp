name: aienvmp
description: AI-first environment map and policy check for coding workspaces
author: soovwv

inputs:
  directory:
    description: Workspace directory to scan
    required: false
    default: "."
  strict:
    description: Fail when doctor reports scoped warnings
    required: false
    default: "off"
  write-plan:
    description: Write read-only AI plan artifacts
    required: false
    default: "true"
  write-status:
    description: Write compact AI status artifact
    required: false
    default: "true"
  write-schema:
    description: Write stable AI output contract artifact
    required: false
    default: "true"
  write-doctor-json:
    description: Write doctor JSON with advisory/strict exit behavior
    required: false
    default: "true"
  write-sbom:
    description: Write standalone light SBOM and CycloneDX-lite artifacts
    required: false
    default: "true"
  write-summary:
    description: Write compact Markdown summary and append it to GitHub Step Summary
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Sync environment map
      shell: bash
      run: node "$GITHUB_ACTION_PATH/bin/aienvmp.js" sync --dir "${{ inputs.directory }}" --quiet

    - name: Write AI plan
      shell: bash
      run: |
        if [ "${{ inputs.write-plan }}" = "true" ]; then
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" plan --dir "${{ inputs.directory }}" --write --json
        fi

    - name: Write AI status
      shell: bash
      run: |
        if [ "${{ inputs.write-status }}" = "true" ]; then
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" status --dir "${{ inputs.directory }}" --write --quiet
        fi

    - name: Write AI schema
      shell: bash
      run: |
        if [ "${{ inputs.write-schema }}" = "true" ]; then
          mkdir -p "${{ inputs.directory }}/.aienvmp"
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" schema --json > "${{ inputs.directory }}/.aienvmp/schema.json"
        fi

    - name: Write doctor advisory JSON
      shell: bash
      run: |
        if [ "${{ inputs.write-doctor-json }}" = "true" ]; then
          mkdir -p "${{ inputs.directory }}/.aienvmp"
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" doctor --dir "${{ inputs.directory }}" --json > "${{ inputs.directory }}/.aienvmp/doctor.json"
        fi

    - name: Write SBOM artifacts
      shell: bash
      run: |
        if [ "${{ inputs.write-sbom }}" = "true" ]; then
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" sbom --dir "${{ inputs.directory }}" --write --quiet
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" sbom --dir "${{ inputs.directory }}" --format cyclonedx-lite --write --quiet
        fi

    - name: Write AI summary
      shell: bash
      run: |
        if [ "${{ inputs.write-summary }}" = "true" ]; then
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" summary --dir "${{ inputs.directory }}" --write --quiet
          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            cat "${{ inputs.directory }}/.aienvmp/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
        fi

    - name: Doctor
      shell: bash
      run: |
        if [ "${{ inputs.strict }}" = "true" ]; then
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" doctor --dir "${{ inputs.directory }}" --ci
        elif [ "${{ inputs.strict }}" != "false" ] && [ "${{ inputs.strict }}" != "off" ]; then
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" doctor --dir "${{ inputs.directory }}" --strict "${{ inputs.strict }}"
        else
          node "$GITHUB_ACTION_PATH/bin/aienvmp.js" doctor --dir "${{ inputs.directory }}"
        fi
